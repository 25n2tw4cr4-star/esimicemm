<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICEM Royal - متجر العطور الملكي</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
background:#f9f9f9;
color:#333;
line-height:1.6;
}

header{
background:#d60000;
color:#fff;
padding:40px 20px;
text-align:center;
font-size:36px;
font-weight:bold;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.products{
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
max-width:1100px;
margin:auto;
}

.card{
background:#fff;
border:1px solid #eee;
padding:25px;
border-radius:15px;
text-align:center;
transition:0.3s;
box-shadow:0 2px 15px rgba(0,0,0,0.05);
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:10px;
color:#444;
}

.price{
font-size:26px;
font-weight:bold;
margin:15px 0;
color:#d60000;
}

button{
background:#d60000;
color:#fff;
border:none;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-size:16px;
font-weight:bold;
width:100%;
transition:0.3s;
}

button:hover{
background:#b50000;
}

.cart,.payment{
max-width:700px;
margin:30px auto;
padding:25px;
background:#fff;
border-radius:15px;
box-shadow:0 2px 15px rgba(0,0,0,0.05);
}

#items div{
padding:10px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
outline:none;
}

input:focus{
border-color:#d60000;
}

.total{
font-size:24px;
font-weight:bold;
margin-top:20px;
color:#111;
text-align:left;
}

footer{
background:#222;
color:#fff;
text-align:center;
padding:25px;
margin-top:40px;
font-size:14px;
}
</style>
</head>

<body>

<header>ICEM ROYAL</header>

<section class="products">

<div class="card">
<h3>Royal Oud</h3>
<div class="price">8 OMR</div>
<button onclick="addToCart('Royal Oud',8)">إضافة للسلة</button>
</div>

<div class="card">
<h3>Midnight Noir</h3>
<div class="price">7 OMR</div>
<button onclick="addToCart('Midnight Noir',7)">إضافة للسلة</button>
</div>

<div class="card">
<h3>Golden Musk</h3>
<div class="price">9 OMR</div>
<button onclick="addToCart('Golden Musk',9)">إضافة للسلة</button>
</div>

</section>

<section class="cart">
<h2>سلة التسوق</h2>

<div id="items">
<p style="color:#888;text-align:center;">السلة فارغة حالياً</p>
</div>

<div class="total">
الإجمالي:
<span id="total">0</span>
ريال عماني
</div>
</section>

<section class="payment">
<h2>الدفع بالبطاقة البنكية</h2>

<input type="text" placeholder="اسم صاحب البطاقة">
<input type="text" placeholder="رقم البطاقة">

<div style="display:flex;gap:10px;">
<input type="text" placeholder="MM/YY">
<input type="text" placeholder="CVV">
</div>

<button onclick="payNow()" style="margin-top:15px;">دفع الآن</button>

</section>

<footer>
جميع الحقوق محفوظة لـ ICEM Royal © 2026
<br>
للتواصل: 76069341
</footer>

<script>
let total = 0;
let itemsContainer = document.getElementById("items");

function addToCart(name,price){

if(total===0){
itemsContainer.innerHTML="";
}

let item = document.createElement("div");
item.innerHTML =
"<span>"+name+"</span><span>"+price+" OMR</span>";

itemsContainer.appendChild(item);

total += price;

document.getElementById("total").innerText = total;
}

function payNow(){

if(total===0){

alert("سلتك فارغة! يرجى اختيار عطر أولاً.");

}else{

alert("تمت عملية الدفع بنجاح! شكراً لثقتكم بـ ICEM Royal.");

total = 0;

document.getElementById("total").innerText = total;

itemsContainer.innerHTML =
'<p style="color:#888;text-align:center;">السلة فارغة حالياً</p>';

}
}
</script>

</body>
</html>
